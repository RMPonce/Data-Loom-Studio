<script>

const services = [
  {
    logos: [
 "IMG/EXCEL.png",
 "IMG/SHEET.png",
 "IMG/GMAIL.png",
 "IMG/NOTION.png"
],
    title: "Virtual Assistance Support",
    color: "#e5d109",
    items: ["Data entry and file organization", "Admin support tasks", "Email management assistance", "Basic research work"]
  },
  {
    logos: [
 "IMG/SHEET.png",
 "IMG/NOTION.png",
 "IMG/DRIVE.png",
 "IMG/TRELLO.png"
],
    title: "Data & Productivity Systems",
    color: "#FFFFFF",
    items: ["Google Sheets setup and automation", "Tracking systems", "Digital file organization", "Dashboard setup"]
  },
  {
    logos: [
 "IMG/CANVA.png",
 "IMG/PPT.png",
 "IMG/META.png",
 "IMG/notion.png"
],
    title: "Creative & Content Support",
    color: "#ff8c42",
    items: ["Canva design assistance", "Presentation creation", "Social media content", "Branding support"]
  },
  {
   logos: [
 "IMG/CALENDAR.png",
 "IMG/CALENDLY.png",
 "IMG/CLOCKIFY.png",
 "IMG/TRELLO.png"
],
    title: "Scheduling & Workflow Management",
    color: "#e5d109",
    items: ["Calendar setup", "Appointment systems", "Workflow automation"]
  },
  {
    logos: [
 "IMG/MAILCHIMP.png",
 "IMG/LINKEDIN.png",
 "IMG/SNOV.png",
 "IMG/APOLLO.png"
],
    title: "Marketing & Lead Support",
    color: "#ff8c42",
    items: ["Email marketing setup", "Lead research", "Outreach support", "Contact list building"]
  },
  {
    logos: [
 "IMG/CHATGPT.png",
 "IMG/GEMINI.png",
 "IMG/COPILOT.png",
 "IMG/METAAI.png"
],
    title: "AI-Assisted Support",
    color: "#FFFFFF",
    items: ["AI research & drafting", "Workflow assistance", "Information structuring"]
  }
];

function buildCards() {
  const grid = document.getElementById("services-grid");

  services.forEach((s, i) => {
    const card = document.createElement("div");

    card.className = "service-card rounded-2xl p-6";
    card.style.background = "#2a2a2a";
    card.style.border = "1px solid rgba(255,255,255,0.06)";
    card.style.animation = "fadeUp 0.6s ease forwards";
    card.style.animationDelay = (i * 0.12) + "s";

    card.innerHTML = `
      <div style="
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:10px;
">
  ${s.logos.map(logo => `
    <div style="
      width:42px;
      height:42px;
      border-radius:12px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.06);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:6px;
    ">
      <img src="${logo}" 
           style="
             width:24px;
             height:24px;
             object-fit:contain;
           ">
    </div>
  `).join('')}
</div>

      <h3 style="color:${s.color}; margin-top:12px; font-size:16px; font-weight:600;">
        ${s.title}
      </h3>

      <ul style="margin-top:12px; font-size:13px; opacity:0.85;">
        ${s.items.map(item => `<li style="margin-bottom:6px;">✔ ${item}</li>`).join('')}
      </ul>
    `;

    grid.appendChild(card);
  });
}

document.addEventListener("DOMContentLoaded", buildCards);

</script>

  <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>

<script>
const mobileBtn = document.getElementById("mobile-menu-btn");
const mobileMenu = document.getElementById("mobile-menu");
const mobileClose = document.getElementById("mobile-close");

mobileBtn.addEventListener("click", () => {
  mobileMenu.classList.remove("hidden");
});

mobileClose.addEventListener("click", () => {
  mobileMenu.classList.add("hidden");
});

function closeMobile() {
  mobileMenu.classList.add("hidden");
}
</script>

<script>
// Disable Ctrl + zoom (desktop)
document.addEventListener('wheel', function (e) {
  if (e.ctrlKey) {
    e.preventDefault();
  }
}, { passive: false });

// Disable Ctrl + / Ctrl - / Ctrl 0
document.addEventListener('keydown', function (e) {
  if ((e.ctrlKey || e.metaKey) &&
     (e.key === '+' || e.key === '-' || e.key === '0')) {
    e.preventDefault();
  }
});

</script>
